workflows:
  build_app:
    name: Build Cross-Platform Flutter App
    scripts:
      # --------------------------------------------------------
      # 1. Backup repo-provided lib/ and android_overrides/
      # --------------------------------------------------------
      - name: Backup custom code
        script: |
          echo "Backing up custom lib and android_overrides..."
          mkdir -p repo_backup/lib
          mkdir -p repo_backup/android_overrides

          cp -R lib/* repo_backup/lib/ 2>/dev/null || true
          cp -R android_overrides/* repo_backup/android_overrides/ 2>/dev/null || true

      # --------------------------------------------------------
      # 2. Create FULL Flutter project (all platforms)
      # --------------------------------------------------------
      - name: Create fresh Flutter skeleton with all platforms
        script: |
          echo "Creating Flutter project with ALL platforms..."
          flutter create --platforms=android,ios,web,windows,macos,linux pcb_app

          cd pcb_app
          
          # Remove auto-generated lib
          rm -rf lib/*

      # --------------------------------------------------------
      # 3. Restore your custom lib/
      # --------------------------------------------------------
      - name: Restore lib folder
        script: |
          echo "Restoring custom lib/"
          cp -R ../repo_backup/lib/* pcb_app/lib/ 2>/dev/null || true

      # --------------------------------------------------------
      # 4. Restore android_overrides into exact matching locations
      # --------------------------------------------------------
      - name: Restore Android overrides (if present)
        script: |
          echo "Restoring android overrides..."

          # Copy ARM directory structure but only overwrite what's present
          # This ensures NO assumptions about file names (manifest only? XML only? etc.)
          
          rsync -av \
            ../repo_backup/android_overrides/ \
            pcb_app/android/app/src/main/ \
            --ignore-missing-args || true

      # --------------------------------------------------------
      # 5. Build APK
      # --------------------------------------------------------
      - name: Build Release APK
        script: |
          cd pcb_app
          flutter build apk --release
