workflows:
  build_app:
    name: PCB App Builder
    max_build_duration: 60
    instance_type: mac_mini_m1 # Recommended for Flutter
    scripts:
      - name: Initialize and Sync Project
        script: | 
          # 1. Create the full project scaffolding in the current directory
          # Using --force . avoids creating a subfolder like 'pcb_app'
          flutter create --force .

          # 2. Clean out the boilerplate lib folder
          rm -rf lib
          
          # 3. Restore your actual lib from the git clone
          # Since we didn't move it to a backup folder, it's still in the root 
          # (unless 'flutter create' overwrote it, so we use a temp move)
          mkdir -p /tmp/repo_lib
          cp -R lib_backup_path/* /tmp/repo_lib/ # Logic explained below
          
      - name: Overwrite with Repository Code
        script: |
          # Codemagic clones your repo into the root. 
          # Let's move your overrides specifically.
          
          echo "Applying Android overrides..."
          # If your overrides are structured to match the 'android' folder:
          if [ -d "android_overrides" ]; then
            cp -R android_overrides/* android/
          fi

      - name: Get Dependencies
        script: |
          flutter pub get

      - name: Build Release APK
        script: |
          flutter build apk --release
          
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
