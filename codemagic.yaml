workflows:
  build_app:
    name: PCB App Builder
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Prepare and Scaffolding
        script: | 
          # 1. Safely move your repository code to a temporary location
          echo "Backing up repository source..."
          mkdir -p /tmp/source_backup
          mv lib /tmp/source_backup/
          
          # Move android_overrides if it exists
          if [ -d "android_overrides" ]; then
            mv android_overrides /tmp/source_backup/
          fi

          # 2. Generate all platform folders (android, ios, webos, etc.)
          # This creates the standard structure Codemagic needs
          flutter create --force --project-name pcb_app .

          # 3. Wipe the default 'lib' and restore your actual code
          rm -rf lib
          mv /tmp/source_backup/lib ./lib
          
          echo "✓ Scaffolding complete and lib restored."

      - name: Apply Android Overrides
        script: |
          # 4. Restore and apply Android overrides
          if [ -d "/tmp/source_backup/android_overrides" ]; then
            echo "Applying Android overrides..."
            # This copies your custom gradle/manifest files into the 'android' folder
            cp -R /tmp/source_backup/android_overrides/* android/
          else
            echo "No android_overrides found, skipping..."
          fi

      - name: Install Dependencies
        script: |
          flutter pub get

      - name: Build Android Release
        script: |
          flutter build apk --release
          
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
