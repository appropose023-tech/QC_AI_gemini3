workflows:
  build_app:
    name: Universal Flutter Project Builder
    instance_type: mac_mini_m1
    max_build_duration: 60

    environment:
      flutter: stable

    scripts:
      # 1. Scaffold a clean Flutter project
      - name: Scaffold Flutter Multiplatform Project
        script: |
          echo ">>> Backing up your repo files..."
          mkdir -p /tmp/repo_files
          rsync -av ./ /tmp/repo_files/ \
            --exclude ".git" \
            --exclude "build" \
            --exclude ".dart_tool"

          echo ">>> Cleaning workspace..."
          find . -mindepth 1 -maxdepth 1 -exec rm -rf {} \;

          echo ">>> Creating full Flutter project..."
          flutter create --project-name pcb_app --platforms=android,ios,web,linux,macos,windows .

      # 2. Restore your real code
      - name: Restore Source Files
        script: |
          echo ">>> Restoring lib and pubspec..."
          rm -rf lib
          cp -R /tmp/repo_files/lib ./lib
          cp /tmp/repo_files/pubspec.yaml ./pubspec.yaml || echo "Using generated pubspec"

      # 3. Apply safe Android overrides (no v1 embedding)
      - name: Apply Android Overrides
        script: |
          echo ">>> Applying Android override files..."

          # Only copy RESOURCES, not manifest or kotlin files
          if [ -d "/tmp/repo_files/android_overrides/app/src/main/res" ]; then
            echo ">>> Copying only RES folder..."
            rsync -av /tmp/repo_files/android_overrides/app/src/main/res/ ./android/app/src/main/res/
          fi

          # Copy network_security_config only
          mkdir -p android/app/src/main/res/xml
          if [ -f "/tmp/repo_files/android_overrides/app/src/main/res/xml/network_security_config.xml" ]; then
            cp /tmp/repo_files/android_overrides/app/src/main/res/xml/network_security_config.xml \
               android/app/src/main/res/xml/network_security_config.xml
          fi

     # 4. Dependencies
     - name: Add Required Packages
        script: |
          echo ">>> Syncing dependencies..."
          flutter pub add http camera || true
          flutter pub get

      # 5. Build APK
      - name: Build Android APK
        script: |
          flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/*.apk
