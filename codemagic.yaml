workflows:
  build_app:
    name: Universal Flutter Project Builder
    instance_type: mac_mini_m1
    max_build_duration: 60

    environment:
      flutter: stable

    scripts:
      # 1. Backup Repo
      - name: Scaffold Flutter Multiplatform Project
        script: |
          echo ">>> Backing up your repo files..."
          mkdir -p /tmp/repo_files
          rsync -av ./ /tmp/repo_files/ \
            --exclude ".git" \
            --exclude "build" \
            --exclude ".dart_tool"

          echo ">>> Cleaning workspace..."
          find . -mindepth 1 -maxdepth 1 -exec rm -rf {} \;

          echo ">>> Creating full Flutter project..."
          flutter create --project-name pcb_app --platforms=android,ios,web,linux,macos,windows .

      # 2. Restore Lib AND Pubspec (Crucial)
      - name: Restore Source Files
        script: |
          echo ">>> Restoring lib and pubspec..."
          rm -rf lib
          cp -R /tmp/repo_files/lib ./lib
          # If you have a custom pubspec, restore it now:
          cp /tmp/repo_files/pubspec.yaml ./pubspec.yaml || echo "Using generated pubspec"

      # 3. Apply Overrides (Fixed Indentation)
      - name: Apply Android Overrides
        script: |
          echo ">>> Applying Android override files..."

          # This path matches: android_overrides/app/src/main/...
          if [ -d "/tmp/repo_files/android_overrides/app/src/main" ]; then
            echo ">>> Merging AndroidManifest and resources..."
            rsync -av /tmp/repo_files/android_overrides/app/src/main/ ./android/app/src/main/
          else
            echo "No valid android_overrides folder found!"
          fi

          # Ensure the XML directory exists before copying the config
          mkdir -p android/app/src/main/res/xml
          if [ -f "/tmp/repo_files/android_overrides/app/src/main/res/xml/network_security_config.xml" ]; then
            cp /tmp/repo_files/android_overrides/app/src/main/res/xml/network_security_config.xml \
               android/app/src/main/res/xml/network_security_config.xml
          fi

      # 4. Dependencies
      - name: Add Required Packages
        script: |
          echo ">>> Syncing dependencies..."
          # If you restored your pubspec.yaml, 'pub get' is enough. 
          # If not, 'pub add' ensures they exist.
          flutter pub add http camera || true 
          flutter pub get

      # 5. Build
      - name: Build Android APK
        script: |
          flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/*.apk
