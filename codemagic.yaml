workflows:
  build-flutter-apk:
    name: Build PCB Inspector APK
    max_build_duration: 60
    environment:
      flutter: stable
      vars:
        APP_NAME: "pcb_inspector_project"

    scripts:
      # 1) Create new Flutter project
      - name: Create fresh Flutter project
        script: |
          flutter create $APP_NAME
          cd $APP_NAME

      # 2) Replace lib folder with provided files
      - name: Inject your custom lib folder
        script: |
          rm -rf lib
          mkdir lib
          cp -R ../lib/* lib/

      # 3) Ensure pubspec.yaml exists (Flutter created it)
      - name: Verify pubspec.yaml
        script: |
          if [ ! -f pubspec.yaml ]; then
            echo "pubspec.yaml missing!"; exit 1;
          fi

      # 4) Add required dependencies
      - name: Add Flutter dependencies
        script: |
          flutter pub add camera
          flutter pub add http

          # For Android permissions
          flutter pub add permission_handler

      # 5) Pub get
      - name: Get packages
        script: |
          flutter pub get

      # 6) Build release APK
      - name: Build Release APK
        script: |
          flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
