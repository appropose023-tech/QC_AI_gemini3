workflows:
  auto_create_flutter_build:
    name: Auto-Create Flutter Project & Build APK
    environment:
      flutter: stable

    scripts:
      - name: Create Flutter App
        script: |
          flutter create my_app
          echo "Flutter project created successfully."

      - name: Replace pubspec.yaml with required dependencies
        script: |
          cd my_app
          cat <<EOF > pubspec.yaml
          name: dynamic_camera_app
          description: Auto-generated Flutter camera app
          publish_to: "none"

          environment:
            sdk: ">=3.3.0 <4.0.0"

          dependencies:
            flutter:
              sdk: flutter
            camera: ^0.11.0
            gallery_saver: ^2.3.2
            path_provider: ^2.1.2
            image: ^4.2.0

          dev_dependencies:
            flutter_test:
              sdk: flutter

          flutter:
            uses-material-design: true
          EOF

      - name: Inject main.dart with camera + gallery save + flexible resolution
        script: |
          cd my_app/lib
          rm -f main.dart

          cat <<'EOF' > main.dart
          import 'dart:io';
          import 'package:flutter/material.dart';
          import 'package:camera/camera.dart';
          import 'package:gallery_saver/gallery_saver.dart';
          import 'package:path_provider/path_provider.dart';

          Future<void> main() async {
            WidgetsFlutterBinding.ensureInitialized();
            final cameras = await availableCameras();
            runApp(MyApp(cameras: cameras));
          }

          class MyApp extends StatelessWidget {
            final List<CameraDescription> cameras;
            const MyApp({super.key, required this.cameras});

            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                home: CameraPage(cameras: cameras),
              );
            }
          }

          class CameraPage extends StatefulWidget {
            final List<CameraDescription> cameras;
            const CameraPage({super.key, required this.cameras});

            @override
            State<CameraPage> createState() => _CameraPageState();
          }

          class _CameraPageState extends State<CameraPage> {
            CameraController? controller;
            ResolutionPreset preset = ResolutionPreset.max;

            @override
            void initState() {
              super.initState();
              initCamera();
            }

            Future<void> initCamera() async {
              controller = CameraController(widget.cameras.first, preset, enableAudio: false);
              await controller!.initialize();
              setState(() {});
            }

            Future<void> capture() async {
              final file = await controller!.takePicture();
              final temp = await getTemporaryDirectory();
              final newPath = "${temp.path}/img_${DateTime.now().millisecondsSinceEpoch}.jpg";

              final saved = await File(file.path).copy(newPath);
              await GallerySaver.saveImage(saved.path);

              ScaffoldMessenger.of(context).showSnackBar(
                SnackBar(content: Text("Saved to gallery")),
              );
            }

            @override
            Widget build(BuildContext context) {
              if (!(controller?.value.isInitialized ?? false)) {
                return Scaffold(body: Center(child: CircularProgressIndicator()));
              }

              return Scaffold(
                appBar: AppBar(title: Text("Camera Test App")),
                body: Column(
                  children: [
                    Expanded(child: CameraPreview(controller!)),
                    DropdownButton<ResolutionPreset>(
                      value: preset,
                      items: ResolutionPreset.values
                          .map((e) => DropdownMenuItem(
                                value: e,
                                child: Text(e.toString()),
                              ))
                          .toList(),
                      onChanged: (v) async {
                        preset = v!;
                        await initCamera();
                      },
                    ),
                    ElevatedButton(
                      onPressed: capture,
                      child: Text("Capture"),
                    ),
                  ],
                ),
              );
            }
          }
          EOF

      - name: Install dependencies
        script: |
          cd my_app
          flutter pub get

      - name: Build APK
        script: |
          cd my_app
          flutter build apk --release
          echo "APK build completed."

    artifacts:
      - my_app/build/app/outputs/flutter-apk/app-release.apk
